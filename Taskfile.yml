version: '3'

vars:
  CITY: Poitiers
  DEPTS: 86
  BATCH: 10

tasks:
  # ── PROSPECTING ─────────────────────────────────────────────────────────────

  scan:
    desc: Scan SIRENE for local tech companies (use DEPTS=86,87)
    cmds:
      - go run . scan --dept {{.DEPTS}}

  score:
    desc: LLM-score unscored companies in DB
    cmds:
      - go run . score

  enrich:
    desc: Enrich scored prospects via website + LinkedIn (use BATCH=10)
    cmds:
      - go run . enrich --batch {{.BATCH}}

  # ── DATA ────────────────────────────────────────────────────────────────────

  download-sirene:
    desc: Download SIRENE Etablissements Parquet
    cmds:
      - mkdir -p data
      - curl -L -o data/sirene_etablissements.parquet https://object.files.data.gouv.fr/data-pipeline-open/siren/stock/StockEtablissement_utf8.parquet

  download-sirene-ul:
    desc: Download SIRENE Unites Legales Parquet
    cmds:
      - mkdir -p data
      - curl -L -o data/sirene_unites_legales.parquet https://object.files.data.gouv.fr/data-pipeline-open/siren/stock/StockUniteLegale_utf8.parquet

  # ── INFRASTRUCTURE ──────────────────────────────────────────────────────────

  stats:
    desc: Show database statistics
    cmds:
      - go run . stats

  dashboard:
    desc: Start local dashboard (localhost:8080)
    cmds:
      - go run . dashboard

  bridge:
    desc: Start the MCP Browser Bridge on port 3000
    cmds:
      - go run . bridge

  # ── UTILS ───────────────────────────────────────────────────────────────────

  wipe:
    desc: Wipe the entire database (delete file)
    cmds:
      - rm -f data/jobs.db data/jobs.db-shm data/jobs.db-wal
      - echo "Database file deleted."

  reset:
    desc: Wipe database and start a fresh scan
    cmds:
      - task: wipe
      - task: scan
