version: '3'

vars:
  PYTHON: python3
  CITY: Poitiers
  DEPTS: 86
  BATCH: 10

tasks:
  setup:
    desc: First-time setup and profile configuration
    cmds:
      - "{{.PYTHON}} jobhunter.py setup"

  install:
    desc: Install python dependencies
    cmds:
      - pip install -r requirements.txt

  # ── JOB SCRAPING ────────────────────────────────────────────────────────────

  scrape:
    desc: Stage 1 — Scrape job sites interactively
    cmds:
      - "{{.PYTHON}} jobhunter.py scrape"

  enrich:
    desc: Stage 2 — Enrich company leads from job listings
    cmds:
      - "{{.PYTHON}} jobhunter.py enrich"

  # ── PROSPECTING ─────────────────────────────────────────────────────────────

  scan:
    desc: Scan SIRENE for local tech companies (use CITY=... DEPTS=...)
    cmds:
      - "{{.PYTHON}} jobhunter.py scan {{.CITY}} {{.DEPTS}}"

  target:
    desc: Score + Enrich best prospects in batch (use BATCH=10)
    cmds:
      - "{{.PYTHON}} jobhunter.py target {{.BATCH}}"

  download-sirene:
    desc: Download SIRENE Etablissements Parquet
    cmds:
      - "{{.PYTHON}} jobhunter.py download-sirene"

  download-sirene-ul:
    desc: Download SIRENE Unites Legales Parquet
    cmds:
      - "{{.PYTHON}} jobhunter.py download-sirene-ul"

  score-prospects:
    desc: LLM-score unscored companies
    cmds:
      - "{{.PYTHON}} jobhunter.py score-prospects"

  # ── INFRASTRUCTURE ──────────────────────────────────────────────────────────

  dashboard:
    desc: Start local dashboard (localhost:8000)
    cmds:
      - "{{.PYTHON}} jobhunter.py dashboard"

  stats:
    desc: Show database statistics
    cmds:
      - "{{.PYTHON}} jobhunter.py stats"

  wipe:
    desc: Wipe database (CLEAN START)
    cmds:
      - rm -f data/jobs.db
      - "{{.PYTHON}} jobhunter/db.py" # Re-init schema
